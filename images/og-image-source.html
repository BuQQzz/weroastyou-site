<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0D0D0D;
    font-family: 'Arial Black', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 800px;
    background: radial-gradient(circle, rgba(232,50,44,0.18) 0%, transparent 65%);
    pointer-events: none;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
    padding: 70px 90px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
  }
  .flame {
    width: 44px;
    height: 44px;
  }
  .brand-name {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .brand-name span { color: #E8322C; }
  .headline {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 28px;
    max-width: 820px;
  }
  .headline .accent { color: #E8322C; }
  .sub {
    font-size: 24px;
    color: #666;
    font-weight: 400;
    font-family: Arial, sans-serif;
    max-width: 620px;
    line-height: 1.5;
    margin-bottom: 44px;
  }
  .pill-row {
    display: flex;
    gap: 14px;
  }
  .pill {
    background: rgba(232,50,44,0.12);
    border: 1px solid rgba(232,50,44,0.3);
    color: #FF6B66;
    font-size: 16px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .price-badge {
    position: absolute;
    right: 90px;
    bottom: 70px;
    text-align: center;
  }
  .price-num {
    font-size: 96px;
    font-weight: 900;
    color: #E8322C;
    line-height: 1;
    letter-spacing: -4px;
  }
  .price-sup {
    font-size: 42px;
    vertical-align: top;
    margin-top: 18px;
    display: inline-block;
    letter-spacing: 0;
  }
  .price-label {
    font-size: 15px;
    color: #444;
    font-family: Arial, sans-serif;
  }
  .divider {
    position: absolute;
    right: 300px;
    top: 70px;
    bottom: 70px;
    width: 1px;
    background: #1a1a1a;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="content">
    <div class="brand">
      <svg class="flame" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 30 C9 30 4 23 4 17 C4 11 8 7 12 4 C12 10 14 13 16 14 C14 10 15 5 16 2 C17 8 20 11 22 14 C23 10 23 6 20 3 C26 8 28 14 28 19 C28 24 24 28 19 30 C20 27 18 24 16 23 C17 26 17 28 16 30Z" fill="#E8322C"/>
        <path d="M16 27 C12 27 9 23 9 19 C9 16 11 14 13 13 C13 16 14 17 15 18 C14 16 15 13 16 11 C16 14 18 15 19 17 C19 14 19 12 18 10 C21 12 23 16 23 20 C23 23 21 26 18 28 C18 26 17 24 16 23 C16 25 16 27 16 27Z" fill="#FF6B55" opacity="0.8"/>
      </svg>
      <div class="brand-name">We <span>Roast</span> You</div>
    </div>
    <div class="headline">Your competitors have<br>better <span class="accent">Google listings.</span></div>
    <div class="sub">Custom 8-page online presence audit for your specific business. Real data, real competitors, real fixes.</div>
    <div class="pill-row">
      <div class="pill">8-page report</div>
      <div class="pill">24hr delivery</div>
      <div class="pill">100% custom</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="price-badge">
    <div class="price-num"><span class="price-sup">$</span>27</div>
    <div class="price-label">one-time flat fee</div>
  </div>
</body>
</html>
